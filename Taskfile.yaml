version: "3"

vars:
  IMG: ghcr.io/chenar/poddoctor:latest
  CLUSTER_NAME: poddoctor
  RELEASE: poddoctor
  NAMESPACE: poddoctor-system

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ─── Web (dashboard SPA, embedded via go:embed — see internal/webui) ───────

  web:build:
    desc: Build the dashboard SPA into internal/webui/dist (required before any Go build/test/lint)
    dir: web
    sources:
      - "src/**/*"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
    generates:
      - ../internal/webui/dist/**/*
    cmds:
      - npm ci
      - npm run build

  # ─── Build ──────────────────────────────────────────────────────────────────

  build:
    desc: Build operator binary
    deps: [web:build]
    cmds:
      - CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/manager ./cmd/main.go

  build:hub:
    desc: Build fleet hub binary
    deps: [web:build]
    cmds:
      - CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/hub ./cmd/hub

  # ─── Test ───────────────────────────────────────────────────────────────────

  test:
    desc: Run all tests
    deps: [web:build]
    cmds:
      - go test ./... -coverprofile=cover.out -v

  test:e2e:
    desc: Run E2E tests against current cluster (operator must already be deployed)
    cmds:
      - ./hack/e2e-test.sh

  lint:
    desc: Run linter
    deps: [web:build]
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format and vet
    deps: [web:build]
    cmds:
      - go fmt ./...
      - go vet ./...

  crd:diff:
    desc: Fail if the Helm CRD template has drifted from the kustomize CRD base
    cmds:
      - >
        diff <(sed -n '/^spec:/,$p' config/crd/bases/diagnostics.poddoctor.dev_poddiagnoses.yaml)
             <(sed -n '/^spec:/,$p' charts/poddoctor/templates/crd.yaml | sed '/{{- end }}/d')
        && echo "CRD spec in sync"

  # ─── Container ──────────────────────────────────────────────────────────────

  docker:build:
    desc: Build container image
    cmds:
      - docker build -t {{.IMG}} .

  docker:push:
    desc: Push container image to registry
    cmds:
      - docker push {{.IMG}}

  # ─── Kustomize (GitOps) deployment ────────────────────────────────────────

  install:
    desc: Install the CRD into the current cluster (kustomize path)
    cmds:
      - kubectl apply -k config/crd

  uninstall:
    desc: Remove the CRD from the current cluster (kustomize path)
    cmds:
      - kubectl delete -k config/crd

  deploy:
    desc: Deploy the operator to the current cluster (kustomize path)
    cmds:
      - cd config/manager && kustomize edit set image controller={{.IMG}}
      - kubectl apply -k config/default

  undeploy:
    desc: Remove the operator from the current cluster (kustomize path)
    cmds:
      - kubectl delete -k config/default

  run:
    desc: Run operator locally against current cluster (dev mode)
    deps: [web:build]
    cmds:
      - go run ./cmd/main.go --leader-elect=false

  # ─── Helm deployment (recommended for production) ─────────────────────────

  helm:lint:
    desc: Lint the Helm chart
    cmds:
      - helm lint charts/poddoctor

  helm:template:
    desc: Render the Helm chart locally
    cmds:
      - helm template {{.RELEASE}} charts/poddoctor

  helm:install:
    desc: Install PodDoctor via Helm into the current cluster
    cmds:
      - helm upgrade --install {{.RELEASE}} charts/poddoctor --namespace {{.NAMESPACE}} --create-namespace --set image.repository={{.IMG}} --wait

  helm:uninstall:
    desc: Remove the Helm release (CRD is kept — see values.yaml installCRDs)
    cmds:
      - helm uninstall {{.RELEASE}} --namespace {{.NAMESPACE}}

  # ─── Code Generation ────────────────────────────────────────────────────────
  # No local controller-gen install required: runs pinned via `go run`.

  generate:
    desc: Regenerate deepcopy methods (CRD schema is hand-maintained, see crd:diff)
    cmds:
      - go run sigs.k8s.io/controller-tools/cmd/controller-gen@v0.19.0 object:headerFile="hack/boilerplate.go.txt" paths="./..."

  # ─── Demo ───────────────────────────────────────────────────────────────────

  demo:
    desc: "One command: kind cluster → build → helm install → trigger real failures → show diagnoses"
    cmds:
      - task: docker:build
      - kind create cluster --name {{.CLUSTER_NAME}} 2>/dev/null || true
      - kind load docker-image {{.IMG}} --name {{.CLUSTER_NAME}}
      - helm upgrade --install {{.RELEASE}} charts/poddoctor --namespace {{.NAMESPACE}} --create-namespace --kube-context kind-{{.CLUSTER_NAME}} --set image.repository={{.IMG}} --set image.pullPolicy=IfNotPresent --wait
      - kubectl apply -f config/samples/ --context kind-{{.CLUSTER_NAME}}
      - echo "Waiting for failures to be diagnosed..."
      - sleep 45
      - echo ""
      - echo "=== Diagnoses ==="
      - kubectl get pd --context kind-{{.CLUSTER_NAME}}
      - echo ""
      - echo "Cleanup → task demo:clean"

  demo:clean:
    desc: Tear down the demo kind cluster
    cmds:
      - kind delete cluster --name {{.CLUSTER_NAME}}
