name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository }}:latest

  hub-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hub
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-hub:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository }}-hub:latest

  chart:
    runs-on: ubuntu-latest
    needs: [image, hub-image]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for chart in poddoctor poddoctor-hub; do
            sed -i "s/^version: .*/version: ${VERSION}/" "charts/${chart}/Chart.yaml"
            sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" "charts/${chart}/Chart.yaml"
            helm package "charts/${chart}" --destination /tmp/chart-out
          done
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          for chart in poddoctor poddoctor-hub; do
            helm push "/tmp/chart-out/${chart}-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
          done

  release:
    runs-on: ubuntu-latest
    needs: [image, hub-image, chart]
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
