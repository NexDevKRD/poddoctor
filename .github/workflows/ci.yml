name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go build ./...
      - run: go vet ./...
      - run: gofmt -l . | tee /tmp/fmt.out && test ! -s /tmp/fmt.out
      - run: go test ./... -v -coverprofile=cover.out
      - run: go tool cover -func=cover.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  docker:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t poddoctor:ci .

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint charts/poddoctor
      - run: helm template poddoctor charts/poddoctor > /dev/null
      - name: verify Helm CRD template matches kustomize CRD base
        run: |
          diff <(sed -n '/^spec:/,$p' config/crd/bases/diagnostics.poddoctor.dev_poddiagnoses.yaml) \
               <(sed -n '/^spec:/,$p' charts/poddoctor/templates/crd.yaml | sed '/{{- end }}/d')

  e2e:
    runs-on: ubuntu-latest
    needs: [docker, helm]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: helm/kind-action@v1
        with:
          cluster_name: poddoctor-ci
      - run: |
          docker build -t poddoctor:ci .
          kind load docker-image poddoctor:ci --name poddoctor-ci
          helm upgrade --install poddoctor charts/poddoctor \
            -n poddoctor-system --create-namespace \
            --set image.repository=poddoctor --set image.tag=ci --set image.pullPolicy=IfNotPresent \
            --wait --timeout 90s
          ./hack/e2e-test.sh || (kubectl -n poddoctor-system logs deployment/poddoctor && exit 1)
