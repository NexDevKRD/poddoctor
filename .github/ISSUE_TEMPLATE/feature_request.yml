name: Feature request
description: Suggest a root-cause rule, integration, or other improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's missing or painful today
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A new rule in internal/diagnosis, a new integration, a Helm value, etc.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
