replicaCount: 1

image:
  repository: ghcr.io/chenar/poddoctor
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

# watchNamespace restricts the operator to a single namespace's Pods.
# Empty (default) watches all namespaces cluster-wide.
watchNamespace: ""

leaderElection:
  # Required for >1 replica so only one instance reconciles at a time.
  enabled: true

diagnosis:
  # Lines of previous-container-instance log fetched as evidence per episode.
  logTailLines: 50
  # How soon after a Deployment rollout a pod start is still considered rollout-correlated.
  rolloutWindow: 10m
  # Max apiserver requests/sec spent gathering evidence (Events search,
  # previous logs). Protects the apiserver from a self-inflicted request
  # storm when a bad rollout crash-loops many pods at once.
  evidenceQPS: 20
  # QPS/burst for the underlying Kubernetes client (watches, writes, reads).
  # client-go defaults to 5 QPS if left unset, which throttles a busy
  # controller well below evidenceQPS above.
  kubeAPIQPS: 50
  kubeAPIBurst: 100

# clusterName identifies this cluster in outbound notifications
# (notifications.webhookURL / notify-config routes) — set it when
# notifications feed a central fleet hub aggregating multiple clusters.
clusterName: ""

# tracing adds a "View Traces" link on each diagnosis, deep-linking into
# Grafana Explore with a TraceQL query for that pod. PodDoctor doesn't
# collect or store traces itself — this just points at your existing
# Tempo + Grafana (or Grafana Cloud). Requires your applications to be
# instrumented with OpenTelemetry and exporting to Tempo. Leave empty to
# disable (the default — no link shown).
tracing:
  grafanaURL: ""
  # UID of the Tempo datasource in Grafana: Grafana admin > Connections >
  # Data sources > (your Tempo datasource) > the "uid" in the URL.
  tempoDatasourceUID: ""

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

metrics:
  enabled: true
  port: 8080
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

notifications:
  # Best-effort POST for every new diagnosis. Leave empty to disable.
  # A Slack incoming-webhook URL is a secret — prefer `--set` or a separate
  # untracked values file over committing it here. Ignored if `routes` below
  # is non-empty (routes take over as the full config, this becomes just
  # their fallback via defaultWebhookURL).
  webhookURL: ""
  # "generic" (JSON fields) or "slack" (Slack incoming-webhook text).
  webhookFormat: generic
  # Bearer token sent with webhookURL (e.g. a fleet hub's ingest token).
  webhookToken: ""
  # Repeated diagnoses with the same namespace+root-cause within this
  # window are folded into one notification, so a mass crash-loop sends
  # one alert instead of hundreds.
  groupWindow: 2m
  # Route different namespaces to different webhooks (e.g. per-team Slack
  # channels, or a mix of team channels + a central fleet hub) instead of
  # one global webhookURL/webhookToken above.
  routes: []
  # routes:
  #   - namespaces: ["payments", "checkout"]
  #     webhookURL: "https://hooks.slack.com/services/..."
  #     webhookFormat: slack
  #   - namespaces: ["*"]
  #     webhookURL: "https://poddoctor-hub.mgmt.example.com/ingest"
  #     webhookFormat: generic
  #     webhookToken: "..."

# Small read-only HTML page listing every PodDiagnosis, newest first.
# Not exposed outside the cluster by default — use:
#   kubectl -n <namespace> port-forward svc/<release>-dashboard 8082:8082
dashboard:
  enabled: true
  port: 8082

podDisruptionBudget:
  enabled: false
  minAvailable: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""

# installCRDs renders the PodDiagnosis CRD as part of this release, so
# `helm upgrade` also upgrades the CRD schema. The CRD carries
# helm.sh/resource-policy: keep, so `helm uninstall` leaves it (and every
# PodDiagnosis it defines) in place rather than deleting them cluster-wide.
installCRDs: true
