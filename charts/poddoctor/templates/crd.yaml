{{- if .Values.installCRDs }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: poddiagnoses.diagnostics.poddoctor.dev
  annotations:
    # Keep the CRD (and every PodDiagnosis it defines) on `helm uninstall`.
    # Deleting a CRD deletes all its custom resources cluster-wide; that's
    # rarely what an uninstall means. Remove manually if truly needed:
    #   kubectl delete crd poddiagnoses.diagnostics.poddoctor.dev
    helm.sh/resource-policy: keep
spec:
  group: diagnostics.poddoctor.dev
  names:
    kind: PodDiagnosis
    listKind: PodDiagnosisList
    plural: poddiagnoses
    singular: poddiagnosis
    shortNames:
      - pd
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Pod
          type: string
          jsonPath: .spec.podName
        - name: Root Cause
          type: string
          jsonPath: .status.rootCause
        - name: Confidence
          type: string
          jsonPath: .status.confidence
        - name: Restarts
          type: integer
          jsonPath: .status.restartCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: |-
            PodDiagnosis is the Schema for the poddiagnoses API. Each instance holds
            the operator's root-cause analysis for one crash-looping Pod container.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: |-
                PodDiagnosisSpec identifies the pod/container this diagnosis covers.
                PodDiagnosis objects are created and owned by the operator; spec is
                written once at creation and not intended for user edits.
              required:
                - podName
                - podNamespace
                - containerName
              properties:
                podName:
                  type: string
                  description: PodName is the name of the diagnosed Pod.
                podNamespace:
                  type: string
                  description: PodNamespace is the namespace of the diagnosed Pod.
                containerName:
                  type: string
                  description: ContainerName is the container within the Pod that is crash-looping.
                podUID:
                  type: string
                  description: PodUID is the UID of the diagnosed Pod at time of diagnosis.
            status:
              type: object
              description: PodDiagnosisStatus is the diagnosis result, written by the operator.
              properties:
                phase:
                  type: string
                  enum: [Diagnosing, Diagnosed]
                  description: "Phase is the diagnosis lifecycle: Diagnosing or Diagnosed."
                rootCause:
                  type: string
                  enum:
                    - OOMKilled
                    - ImagePullError
                    - BadCommand
                    - SegFault
                    - SignalKilled
                    - ProbeFailure
                    - RecentRolloutRegression
                    - ApplicationError
                    - Unknown
                  description: RootCause is the operator's best determination of why the container is failing.
                confidence:
                  type: string
                  enum: [High, Medium, Low]
                  description: Confidence indicates how much corroborating evidence backs RootCause.
                summary:
                  type: string
                  description: Summary is a one-line human-readable explanation of the failure.
                recommendation:
                  type: string
                  description: Recommendation is a suggested next step to resolve the failure.
                exitCode:
                  type: integer
                  format: int32
                  nullable: true
                  description: ExitCode is the container's last exit code, if it ever terminated.
                terminationReason:
                  type: string
                  description: |-
                    TerminationReason is the raw Kubernetes termination/waiting reason
                    (e.g. OOMKilled, Error, CrashLoopBackOff, ImagePullBackOff).
                restartCount:
                  type: integer
                  format: int32
                  description: RestartCount is the container restart count at last diagnosis.
                lastDiagnosedRestartCount:
                  type: integer
                  format: int32
                  description: |-
                    LastDiagnosedRestartCount is the restart count already diagnosed,
                    used to avoid re-diagnosing the same failure episode.
                recentEvents:
                  type: array
                  description: RecentEvents are the most recent Kubernetes Events for the pod, used as evidence.
                  items:
                    type: object
                    required:
                      - reason
                      - message
                    properties:
                      reason:
                        type: string
                      message:
                        type: string
                      count:
                        type: integer
                        format: int32
                      lastTimestamp:
                        type: string
                        format: date-time
                logExcerpt:
                  type: string
                  description: LogExcerpt is the tail of the previous container instance's logs, truncated.
                rolloutContext:
                  type: string
                  description: RolloutContext describes a recent Deployment rollout correlated with the failure, if any.
                firstObserved:
                  type: string
                  format: date-time
                  description: FirstObserved is when this failure episode was first diagnosed.
                lastObserved:
                  type: string
                  format: date-time
                  description: LastObserved is when this diagnosis was last updated.
          required:
            - spec
{{- end }}
