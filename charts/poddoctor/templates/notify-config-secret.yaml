{{- if .Values.notifications.routes }}
# A Secret, not a ConfigMap: routes may carry webhookToken values.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "poddoctor.fullname" . }}-notify-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "poddoctor.labels" . | nindent 4 }}
type: Opaque
stringData:
  notify-config.yaml: |
    defaultWebhookURL: {{ .Values.notifications.webhookURL | quote }}
    defaultWebhookFormat: {{ .Values.notifications.webhookFormat | quote }}
    defaultWebhookToken: {{ .Values.notifications.webhookToken | quote }}
    routes:
      {{- toYaml .Values.notifications.routes | nindent 6 }}
{{- end }}
