apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "poddoctor.fullname" . }}-manager-role
  labels:
    {{- include "poddoctor.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - diagnostics.poddoctor.dev
    resources:
      - poddiagnoses
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - diagnostics.poddoctor.dev
    resources:
      - poddiagnoses/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - watch
      - create
      - patch
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - apps
    resources:
      - replicasets
      - deployments
      - controllerrevisions
    verbs:
      - get
      - list
      - watch
