{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "poddoctor.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "poddoctor.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "poddoctor.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
{{- end }}
