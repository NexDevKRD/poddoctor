apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "poddoctor.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "poddoctor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "poddoctor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "poddoctor.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "poddoctor.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.leaderElection.enabled }}
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            - --log-tail-lines={{ .Values.diagnosis.logTailLines }}
            - --rollout-window={{ .Values.diagnosis.rolloutWindow }}
            - --dashboard-bind-address={{ if .Values.dashboard.enabled }}:{{ .Values.dashboard.port }}{{ else }}0{{ end }}
            {{- if .Values.watchNamespace }}
            - --namespace={{ .Values.watchNamespace }}
            {{- end }}
            {{- if .Values.notifications.webhookURL }}
            - --webhook-url={{ .Values.notifications.webhookURL }}
            - --webhook-format={{ .Values.notifications.webhookFormat }}
            {{- end }}
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - containerPort: {{ .Values.metrics.port }}
              name: metrics
              protocol: TCP
            {{- end }}
            {{- if .Values.dashboard.enabled }}
            - containerPort: {{ .Values.dashboard.port }}
              name: dashboard
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
