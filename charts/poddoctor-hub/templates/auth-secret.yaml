{{- if and .Values.auth.token (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "poddoctor-hub.tokenSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "poddoctor-hub.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.existingSecretKey }}: {{ .Values.auth.token | quote }}
{{- end }}
