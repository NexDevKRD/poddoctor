{{- if and .Values.database.dsn (not .Values.database.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "poddoctor-hub.dsnSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "poddoctor-hub.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.database.existingSecretKey }}: {{ .Values.database.dsn | quote }}
{{- end }}
