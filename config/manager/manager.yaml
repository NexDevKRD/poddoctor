apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: poddoctor-system
  labels:
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: poddoctor-controller-manager
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: controller:latest
          args:
            - --leader-elect=false
            - --health-probe-bind-address=:8081
            - --log-tail-lines=50
            - --rollout-window=10m
            - --dashboard-bind-address=:8082
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8082
              name: dashboard
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
